version: '3.8'

services:
  fcg-db-central:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver-db
    restart: unless-stopped 
    user: root
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sql_db_fcg_central:/var/opt/mssql/data
    networks:
      - fcg-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${MSSQL_SA_PASSWORD} -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-dev
    ports:
      - "5672:5672"   
      - "15672:15672" 
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - fcg-network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    restart: unless-stopped
  redis:
    image: redis:7-alpine  
    command: redis-server --appendonly yes --requirepass ${REDIS_SA_PASSWORD}
    container_name: redis-fcg
    restart: unless-stopped 
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"
    networks:
      - fcg-network
    volumes:
     - redis_data:/data
  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight-fcg
    restart: unless-stopped 
    ports:
      - "8001:5540"
    networks:
      - fcg-network
  users-db-migration:
    image: alexoliverdev/fcg-usuario-api:latest
    container_name: fcg-users-db-migration
    depends_on:
      fcg-db-central:
        condition: service_healthy
    command: ["./efbundle"]
    environment:
      - DatabaseSettings__Host=fcg-db-central
      - DatabaseSettings__Port=1433
      - DatabaseSettings__DatabaseName=Fcg_Users
      - DatabaseSettings__Username=sa
      - DatabaseSettings__Password=${MSSQL_SA_PASSWORD}    
    networks:
      - fcg-network

  users-api:
    image: alexoliverdev/fcg-usuario-api:latest
    container_name: fcg-users-api
    ports:
      - "8081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DatabaseSettings__Host=fcg-db-central
      - DatabaseSettings__Port=1433
      - DatabaseSettings__DatabaseName=Fcg_Users
      - DatabaseSettings__Username=sa
      - DatabaseSettings__Password=${MSSQL_SA_PASSWORD}
      - RabbitMqSettings__Host=rabbitmq
      - RabbitMqSettings__Port=5672
      - RabbitMqSettings__Username=guest
      - RabbitMqSettings__Password=guest
      - JwtSettings__Secret=${JWT_SECRET}  
    depends_on:
      fcg-db-central:
        condition: service_healthy 
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      users-db-migration:
        condition: service_completed_successfully
    networks:
      - fcg-network

  notifications-api:
    image: alexoliverdev/fcg-notification-api:latest
    container_name: fcg-notifications-api
    ports:
      - "8082:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMqSettings__NotificationUserCreatedQueue=notifications-user-created
      - RabbitMqSettings__NotificationPaymentFailedQueue=notifications-payment-failed
      - RabbitMqSettings__NotificationPaymentProcessedQueue=notifications-payment-processed
      - RabbitMqSettings__NotificationDeliveryFailedQueue=notification-delivery-failed
      - RabbitMqSettings__Host=rabbitmq
      - RabbitMqSettings__Port=5672
      - RabbitMqSettings__Username=guest
      - RabbitMqSettings__Password=guest
      - Redis__Host=redis
      - Redis__Port=6379
      - Redis__Password=${REDIS_SA_PASSWORD}
      - "Redis__InstanceName=FiapCloudGames:"
      - MASSTRANSIT_USAGE_TELEMETRY=false
    depends_on:
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    networks:
      - fcg-network

  payments-db-migration:
    image: alexoliverdev/fcg-payments-api:latest
    container_name: fcg-payments-db-migration
    depends_on:
      fcg-db-central:
        condition: service_healthy
    command: ["./efbundle"]
    environment:
      - DatabaseSettings__Host=fcg-db-central
      - DatabaseSettings__Port=1433
      - DatabaseSettings__DatabaseName=Fcg_Payments
      - DatabaseSettings__Username=sa
      - DatabaseSettings__Password=${MSSQL_SA_PASSWORD}    
    networks:
      - fcg-network

  payments-api:
    image: alexoliverdev/fcg-payments-api:latest  
    container_name: fcg-payments-api
    ports:
      - "8083:8080"
    environment:
     - ASPNETCORE_ENVIRONMENT=Development
     - RabbitMqSettings__Host=rabbitmq
     - RabbitMqSettings__Port=5672
     - RabbitMqSettings__Username=guest
     - RabbitMqSettings__Password=guest
     - RabbitMqSettings__PaymentOrderQueue=payment-order-queue
     - RabbitMqSettings__PaymentDeliveryFailedQueue=payment-delivery-failed-queue
     - DatabaseSettings__Host=fcg-db-central
     - DatabaseSettings__Port=1433
     - DatabaseSettings__DatabaseName=Fcg_Payments
     - DatabaseSettings__Username=sa
     - DatabaseSettings__Password=${MSSQL_SA_PASSWORD}
     - MASSTRANSIT_USAGE_TELEMETRY=false 
    depends_on:
      fcg-db-central:
        condition: service_healthy 
      rabbitmq:
        condition: service_started     
      payments-db-migration:
        condition: service_completed_successfully
    networks:
      - fcg-network

  catalog-db-migration:
    image: alexoliverdev/fcg-catalog-api:latest
    container_name: fcg-catalog-db-migration
    depends_on:
      fcg-db-central:
        condition: service_healthy
    command: ["./efbundle"]
    environment:
      - DatabaseSettings__Host=fcg-db-central
      - DatabaseSettings__Port=1433
      - DatabaseSettings__DatabaseName=Fcg_Catalogs
      - DatabaseSettings__Username=sa
      - DatabaseSettings__Password=${MSSQL_SA_PASSWORD}    
    networks:
      - fcg-network

  catalog-api:
    image: alexoliverdev/fcg-catalog-api:latest
    container_name: fcg-catalog-api
    ports:
      - "8084:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - RabbitMqSettings__Host=rabbitmq
      - RabbitMqSettings__Port=5672
      - RabbitMqSettings__Username=guest
      - RabbitMqSettings__Password=guest
      - RabbitMqSettings__CatalogPaymentFailedQueue=catalog-payment-failed-queue
      - RabbitMqSettings__CatalogPaymentProcessedQueue=catalog-payment-processed-queue
      - DatabaseSettings__Host=fcg-db-central
      - DatabaseSettings__Port=1433
      - DatabaseSettings__DatabaseName=Fcg_Catalogs
      - DatabaseSettings__Username=sa
      - DatabaseSettings__Password=${MSSQL_SA_PASSWORD}
      - JwtSettings__Secret=${JWT_SECRET}  
      - Redis__Host=redis
      - Redis__Port=6379
      - Redis__Password=${REDIS_SA_PASSWORD}
      - "Redis__InstanceName=FiapCloudGames:"
    depends_on:
      fcg-db-central:
        condition: service_healthy 
      rabbitmq:
        condition: service_started
      redis:
        condition: service_started     
      catalog-db-migration:
        condition: service_completed_successfully
    networks:
      - fcg-network


volumes:
  sql_db_fcg_central:
  rabbitmq_data:
  redis_data:

networks:
  fcg-network:
    driver: bridge