apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq-dev
  template:
    metadata:
      labels:
        app: rabbitmq-dev
    spec:
      containers:
      - name: c-rabbitmq-dev
        image: rabbitmq:3-management
        ports:
          - containerPort: 5672
          - containerPort: 15672
        env:
          - name: RABBITMQ_HOST
            valueFrom:
              configMapKeyRef:
                name: rabbitmq-config
                key: RABBITMQ_HOST
          - name: K8S_RABBITMQ_PORT
            valueFrom:
              configMapKeyRef:
                name: rabbitmq-config
                key: RABBITMQ_PORT
          - name: RABBITMQ_MAN_PORT
            valueFrom:
              configMapKeyRef:
                name: rabbitmq-config
                key: RABBITMQ_MAN_PORT
          - name: RABBITMQ_DEFAULT_USER
            valueFrom:
              secretKeyRef:
                name: rabbitmq-opaque
                key: rabbit_user
          - name: RABBITMQ_DEFAULT_PASS
            valueFrom:
              secretKeyRef:
                name: rabbitmq-opaque
                key: rabbit_pass
        livenessProbe:
          exec:
            command: ["rabbitmq-diagnostics", "status"]
          initialDelaySeconds: 20
          periodSeconds: 15
          timeoutSeconds: 5
        readinessProbe:
          exec:
            command: ["rabbitmq-diagnostics", "check_port_connectivity"]
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        volumeMounts:
          - name: rabbitmq-storage
            mountPath: /var/lib/rabbitmq 
      volumes:
        - name: rabbitmq-storage
          persistentVolumeClaim:
            claimName: rabbitmq-data-pvc

        